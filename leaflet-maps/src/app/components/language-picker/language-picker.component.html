<div class="language-picker">
  <button class="language-btn" type="button" (click)="toggle()" [title]="language.t('common.language')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
      <path d="M4 5h12" />
      <path d="M10 5c0 7-2 11-6 15" />
      <path d="M7 12h6" />
      <path d="M15 19l4-9 4 9" />
      <path d="M16.5 16h5" />
    </svg>
    <span>{{ language.currentLanguage().toUpperCase() }}</span>
  </button>

  @if (open()) {
  <div class="language-dropdown">
    @for (option of options; track option.code) {
    <button type="button" class="language-option"
      [class.language-option--active]="language.currentLanguage() === option.code" (click)="select(option.code)">
      <span>{{ option.label }}</span>
      @if (language.currentLanguage() === option.code) {
      <span class="language-check">✓</span>
      }
    </button>
    }
  </div>
  }
</div>
